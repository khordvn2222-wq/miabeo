<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Mía Béo</title>
    <style>
        /* ----- CÀI ĐẶT GIAO DIỆN CƠ BẢN ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 4px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 4px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            animation: starsFlying 20s linear infinite;
            
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden; 
            position: relative; 
        }

        @keyframes starsFlying {
            0% { background-position: 0 0, 40px 60px, 130px 270px; }
            100% { background-position: -550px 0, -310px 60px, -120px 270px; }
        }

        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ----- QUẢN LÝ CÁC MÀN HÌNH ----- */
        .screen {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .screen.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            visibility: visible;
            pointer-events: auto;
        }

        .screen.hidden {
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            visibility: hidden;
            pointer-events: none;
        }

        /* ----- CSS CHO AVATAR ----- */
        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid #fff; 
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5); 
            margin-bottom: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.8);
        }

        .small-avatar {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }

        /* ----- HIỆU ỨNG GÕ CHỮ ----- */
        #typing-title-container {
            font-size: 3.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            min-height: 1.2em; 
        }

        #typing-title::after {
            content: '|';
            animation: blink 0.8s infinite;
            margin-left: 5px;
            font-weight: normal;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* ----- CÁC NÚT BẤM CHUNG ----- */
        .btn {
            background-color: rgba(0, 0, 0, 0.5); 
            color: #fff;
            border: 2px solid #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            backdrop-filter: blur(5px); 
        }

        .btn:hover {
            background-color: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.9);
            transform: translateY(-3px); 
        }

        #start-btn {
            padding: 15px 50px;
            border-radius: 50px;
        }

        #menu-screen {
            width: 320px;
            gap: 20px;
        }

        .menu-btn {
            padding: 18px;
            border-radius: 15px;
            width: 100%;
        }

        #back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1rem;
            z-index: 10; 
            transition: all 0.5s ease;
        }

        #back-btn.hidden {
            opacity: 0;
            transform: translateX(-20px);
            visibility: hidden;
            pointer-events: none;
        }

        /* ----- DANH SÁCH THÔNG TIN ----- */
        .info-list {
            list-style: none;
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 25px 20px;
            text-align: left;
            width: 450px;
            max-width: 90vw; 
            backdrop-filter: blur(8px);
        }

        .info-list li {
            font-size: 1.1rem;
            margin-bottom: 15px;
            line-height: 1.5;
            padding-left: 30px;
            position: relative;
            opacity: 0;
            transform: translateY(-20px);
        }

        .info-list li::before {
            content: "🐾"; 
            position: absolute;
            left: 0;
            top: 1px;
            font-size: 1rem;
        }

        .info-list li:last-child {
            margin-bottom: 0;
        }

        .screen.active .info-list li {
            animation: fadeInDown 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: var(--delay); 
        }

        @keyframes fadeInDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ----- CSS CHO SLIDESHOW ẢNH ----- */
        .gallery-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .gallery-img-box {
            width: 300px;
            height: 400px;
            border-radius: 15px;
            border: 4px solid #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
            overflow: hidden;
            background-color: rgba(255,255,255,0.1);
        }

        .gallery-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav-btn {
            background-color: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 2px solid #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background-color: #fff;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            transform: scale(1.1);
        }

        .img-counter {
            margin-top: 15px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- NÚT QUAY LẠI -->
    <button class="btn hidden" id="back-btn">&#8592; Quay lại</button>

    <div class="wrapper">
        <!-- 1. MÀN HÌNH CHÍNH (LANDING) -->
        <div class="screen active" id="landing-screen">
            <img src="images/avt.jpg" alt="Mía Béo" class="avatar">
            <h1 id="typing-title-container"><span id="typing-title"></span></h1>
            <button class="btn" id="start-btn">BẮT ĐẦU</button>
        </div>

        <!-- 2. MÀN HÌNH MENU -->
        <div class="screen hidden" id="menu-screen">
            <img src="images/avt.jpg" alt="Mía Béo" class="avatar small-avatar">
            <button class="btn menu-btn" id="btn-info">Thông Tin Mía Béo</button>
            <button class="btn menu-btn" id="btn-gallery">Ảnh Mía Béo</button>
            <button class="btn menu-btn" id="btn-sticker">Sticker Mía Béo</button>
        </div>

        <!-- 3. MÀN HÌNH THÔNG TIN -->
        <div class="screen hidden" id="info-screen">
            <img src="images/avt.jpg" alt="Mía Béo" class="avatar small-avatar">
            <h2>Hồ Sơ Trích Ngang</h2>
            <ul class="info-list">
                <li style="--delay: 0.1s">Màu trắng nhưng ở bửn</li>
                <li style="--delay: 0.2s">Nặng 5 cân rưỡi</li>
                <li style="--delay: 0.3s">Ngày ăn 3 bữa (Nếu cho thêm thì vẫn ăn nữa)</li>
                <li style="--delay: 0.4s">Ngủ 20 tiếng 1 ngày, luôn trong tình trạng khoái cảm đạt cực đại</li>
                <li style="--delay: 0.5s">Mắt luôn lờ đờ như nghiện, trai gọi mới mở to tròn</li>
                <li style="--delay: 0.6s">Chúa rụng lông, đã bửn còn rụng lông</li>
            </ul>
        </div>

        <!-- 4. MÀN HÌNH ẢNH (MỚI) -->
        <div class="screen hidden" id="gallery-screen">
            <h2>Ảnh Của Béo</h2>
            <div class="gallery-container">
                <!-- Nút lùi (Dấu <) -->
                <button class="nav-btn" id="prev-btn">&#10094;</button> 
                
                <!-- Khung chứa ảnh -->
                <div class="gallery-img-box">
                    <img id="current-gallery-img" src="images/img1.jpg" alt="Mía Béo Photo">
                </div>
                
                <!-- Nút tiến (Dấu >) -->
                <button class="nav-btn" id="next-btn">&#10095;</button>
            </div>
            <!-- Bộ đếm số ảnh -->
            <div class="img-counter" id="img-counter">1 / 10</div>
        </div>
    </div>

    <script>
        // --- LOGIC HIỆU ỨNG GÕ CHỮ ---
        const titleText = "Profile Mía Béo";
        const titleElement = document.getElementById('typing-title');
        let typeIndex = 0;

        function typeWriter() {
            if (typeIndex < titleText.length) {
                titleElement.innerHTML += titleText.charAt(typeIndex);
                typeIndex++;
                setTimeout(typeWriter, 120);
            }
        }
        typeWriter();


        // --- LOGIC CHUYỂN MÀN HÌNH ---
        const screens = {
            landing: document.getElementById('landing-screen'),
            menu: document.getElementById('menu-screen'),
            info: document.getElementById('info-screen'),
            gallery: document.getElementById('gallery-screen') // Khai báo thêm màn hình gallery
        };
        const backBtn = document.getElementById('back-btn');
        let currentScreen = 'landing';

        function switchScreen(targetScreen) {
            screens[currentScreen].classList.remove('active');
            screens[currentScreen].classList.add('hidden');
            
            screens[targetScreen].classList.remove('hidden');
            screens[targetScreen].classList.add('active');
            
            currentScreen = targetScreen;
            
            if (currentScreen === 'landing') {
                backBtn.classList.add('hidden');
            } else {
                backBtn.classList.remove('hidden');
            }
        }

        // Bắt sự kiện menu
        document.getElementById('start-btn').addEventListener('click', () => switchScreen('menu'));
        document.getElementById('btn-info').addEventListener('click', () => switchScreen('info'));
        document.getElementById('btn-gallery').addEventListener('click', () => switchScreen('gallery'));

        // Nút quay lại thông minh cập nhật thêm cho thư viện ảnh
        backBtn.addEventListener('click', () => {
            if (currentScreen === 'info' || currentScreen === 'gallery') {
                switchScreen('menu'); // Đang ở Thông tin hoặc Ảnh -> Về Menu
            } else if (currentScreen === 'menu') {
                switchScreen('landing'); // Đang ở Menu -> Về Trang chủ
            }
        });


        // --- LOGIC SLIDESHOW ẢNH ---
        let currentImgIndex = 1;
        const totalImages = 10;
        const galleryImgElement = document.getElementById('current-gallery-img');
        const counterElement = document.getElementById('img-counter');

        function updateGalleryUI() {
            // Cập nhật đường dẫn ảnh
            galleryImgElement.src = `images/img${currentImgIndex}.jpg`;
            // Cập nhật số đếm
            counterElement.innerText = `${currentImgIndex} / ${totalImages}`;
        }

        // Bấm nút Prev (<)
        document.getElementById('prev-btn').addEventListener('click', () => {
            currentImgIndex--;
            if (currentImgIndex < 1) {
                currentImgIndex = totalImages; // Quay vòng về ảnh cuối
            }
            updateGalleryUI();
        });

        // Bấm nút Next (>)
        document.getElementById('next-btn').addEventListener('click', () => {
            currentImgIndex++;
            if (currentImgIndex > totalImages) {
                currentImgIndex = 1; // Quay vòng về ảnh đầu
            }
            updateGalleryUI();
        });
    </script>

</body>
</html>
